"""
全AI + 全动态跨境电商独立站 GraphQL Schema
版本 2.0
"""

# ======================= 标量与指令 =======================
scalar DateTime
scalar JSON
scalar Email
scalar URL
scalar NonEmptyString
scalar PositiveInt

# 多语言支持 (字段结构示例: { "en": "Hello", "zh": "你好" })
scalar LocalizedString

# 货币类型 (金额 + 货币代码)
type Money {
  amount: Float!
  currencyCode: Currency!
}

enum Currency {
  USD
  EUR
  GBP
  CNY
  JPY
  CAD
  AUD
}

# 权限指令（示意，需服务端实现）
directive @auth(requires: Role = CUSTOMER) on OBJECT | FIELD_DEFINITION

enum Role {
  CUSTOMER
  ADMIN
  VENDOR
}

# ======================= 核心类型 =======================

type User @auth(requires: CUSTOMER) {
  id: ID!
  email: Email!
  firstName: String
  lastName: String
  avatar: URL
  addresses: [Address!]!
  defaultAddress: Address
  wishlist: [Product!]!
  orders(first: Int, after: String): OrderConnection!
  createdAt: DateTime!
  lastActive: DateTime
  # AI 个性化字段
  aiPersonalizedRecommendations(limit: Int = 10): [Product!]!   # 基于行为实时生成
}

type Address {
  id: ID!
  fullName: String!
  phone: String
  streetLine1: String!
  streetLine2: String
  city: String!
  state: String
  postalCode: String!
  country: CountryCode!
  isDefault: Boolean!
}

enum CountryCode {
  US
  CN
  JP
  DE
  GB
  # 其余 ISO 3166-1 alpha-2 代码可按需添加
}

type Product {
  id: ID!
  name: LocalizedString!          # 多语言商品名
  slug: NonEmptyString!
  description: LocalizedString
  media: [ProductMedia!]!
  variants: [ProductVariant!]!
  category: Category
  brand: Brand
  tags: [String!]!
  seo: SEO
  rating: Float
  reviewsCount: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  # AI 动态字段
  aiOptimizedPrice(context: PriceContextInput): Money!   # 根据用户/库存/竞品实时计算
  aiRecommendedBundle: [Product!]!                       # 搭配推荐
}

type ProductVariant {
  id: ID!
  sku: NonEmptyString!
  attributes: JSON!                # 如 {"颜色":"红","尺寸":"M"}
  price: Money!
  compareAtPrice: Money
  inventory: Inventory!
  images: [URL!]
  isAvailable: Boolean!
}

type Inventory {
  quantity: PositiveInt!
  reserved: PositiveInt!
  inStock: Boolean!
  warehouseLocation: String
  lowStockThreshold: PositiveInt
}

type ProductMedia {
  kind: MediaKind!
  url: URL!
  altText: String
  order: Int
}

enum MediaKind {
  IMAGE
  VIDEO
  MODEL_3D
}

type Category {
  id: ID!
  name: LocalizedString!
  slug: String!
  parent: Category
  children: [Category!]!
  products(first: Int, after: String): ProductConnection!
}

type Brand {
  id: ID!
  name: String!
  logo: URL
  country: CountryCode
}

type SEO {
  title: String
  description: String
  keywords: [String!]
  canonical: URL
}

type Cart @auth(requires: CUSTOMER) {
  id: ID!
  userId: ID!
  items: [CartItem!]!
  totalPrice: Money!
  totalItems: PositiveInt!
  discountedTotal: Money
  coupon: Coupon
  expiresAt: DateTime!
}

type CartItem {
  id: ID!
  product: Product!
  variant: ProductVariant
  quantity: PositiveInt!
  priceSnapshot: Money!           # 加入时价格快照
  dynamicDiscount: Money          # AI 动态优惠
}

type Order @auth(requires: CUSTOMER) {
  id: ID!
  orderNumber: NonEmptyString!
  user: User!
  lines: [OrderLine!]!
  status: OrderStatus!
  paymentStatus: PaymentStatus!
  shippingAddress: Address!
  billingAddress: Address!
  subtotal: Money!
  shippingFee: Money!
  taxAmount: Money!
  discountTotal: Money!
  grandTotal: Money!
  currency: Currency!
  transactions: [Transaction!]!
  tracking: [Tracking!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  # 实时动态
  estimatedDelivery: DateTime!
}

type OrderLine {
  id: ID!
  productName: String!
  sku: String!
  quantity: PositiveInt!
  unitPrice: Money!
  totalPrice: Money!
  thumbnail: URL
}

enum OrderStatus {
  PENDING
  PROCESSING
  SHIPPED
  DELIVERED
  CANCELLED
  RETURNED
}

enum PaymentStatus {
  UNPAID
  PAID
  REFUNDED
  PARTIALLY_REFUNDED
}

type Transaction {
  id: ID!
  gateway: PaymentGateway!
  amount: Money!
  status: TransactionStatus!
  createdAt: DateTime!
  metadata: JSON
}

enum PaymentGateway {
  STRIPE
  PAYPAL
  ALIPAY
  WECHAT_PAY
}

enum TransactionStatus {
  SUCCESS
  FAILED
  PENDING
}

type Tracking {
  carrier: String!
  trackingNumber: String!
  url: URL
  status: String
  updatedAt: DateTime!
}

type Coupon {
  code: NonEmptyString!
  discountType: DiscountType!
  discountValue: Float!
  minOrderAmount: Money
  validUntil: DateTime
  usageLimit: Int
  usedCount: Int!
}

enum DiscountType {
  PERCENTAGE
  FIXED_AMOUNT
  FREE_SHIPPING
}

type Review {
  id: ID!
  user: User!
  product: Product!
  rating: Int!          # 1-5
  title: String
  content: String
  media: [URL!]
  aiSentiment: Float    # AI 情感评分 -1.0 ~ 1.0
  createdAt: DateTime!
}

# ======================= AI 专用类型 =======================

enum AIAlgorithm {
  COLLABORATIVE_FILTERING
  CONTENT_BASED
  PERSONALIZED_RANKING
  REAL_TIME_BEHAVIOR
}

input PriceContextInput {
  userLatitude: Float
  userLongitude: Float
  userLoyaltyTier: String
  currentInventoryLevel: PositiveInt
  competitorPrice: Money
}

type AIRecommendationBlock {
  title: String!
  products: [Product!]!
  reason: String
  algorithmUsed: AIAlgorithm!
}

type AISearchResult {
  products: [Product!]!
  totalCount: PositiveInt!
  aiExplanation: String    # "因为我注意到你喜欢...推荐这些"
  suggestedFilters: [FilterSuggestion!]!
}

type FilterSuggestion {
  field: String!
  value: String!
  count: PositiveInt!
}

type AIGeneratedContent {
  productId: ID!
  generatedDescription: LocalizedString
  generatedSeoTitle: String
  generatedKeywords: [String!]
  confidence: Float
}

# ======================= 连接类型 (分页) =======================

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
  totalCount: PositiveInt!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

type OrderConnection {
  edges: [OrderEdge!]!
  pageInfo: PageInfo!
  totalCount: PositiveInt!
}

type OrderEdge {
  node: Order!
  cursor: String!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ======================= QUERY =======================

type Query {
  # 商品
  product(id: ID, slug: String): Product
  products(
    first: Int = 20
    after: String
    categoryId: ID
    brandId: ID
    minPrice: Float
    maxPrice: Float
    search: String
    sortBy: ProductSort
  ): ProductConnection! @auth(requires: CUSTOMER)
  
  # 分类/品牌
  categories: [Category!]!
  brands: [Brand!]!
  
  # 购物车与订单
  myCart: Cart @auth(requires: CUSTOMER)
  myOrders(first: Int = 10, after: String): OrderConnection @auth(requires: CUSTOMER)
  order(id: ID!): Order @auth(requires: CUSTOMER)
  
  # AI 功能
  recommendProducts(
    algorithm: AIAlgorithm = PERSONALIZED_RANKING
    limit: Int = 12
    context: PriceContextInput
  ): [Product!]! @auth(requires: CUSTOMER)
  
  aiSearch(
    query: NonEmptyString!
    filters: JSON
    first: Int = 20
  ): AISearchResult! @auth(requires: CUSTOMER)
  
  aiPersonalizedFeed(
    numberOfBlocks: Int = 5
  ): [AIRecommendationBlock!]! @auth(requires: CUSTOMER)
  
  # 辅助
  currencies: [Currency!]!
}

enum ProductSort {
  PRICE_ASC
  PRICE_DESC
  POPULARITY
  NEWEST
  RATING
  RELEVANCE
}

# ======================= MUTATION =======================

type Mutation {
  # 购物车
  addToCart(
    productId: ID!
    variantId: ID
    quantity: PositiveInt = 1
  ): Cart! @auth(requires: CUSTOMER)
  
  updateCartItem(
    itemId: ID!
    quantity: PositiveInt!
  ): Cart! @auth(requires: CUSTOMER)
  
  removeCartItem(itemId: ID!): Cart! @auth(requires: CUSTOMER)
  
  applyCoupon(code: NonEmptyString!): Cart! @auth(requires: CUSTOMER)
  removeCoupon: Cart! @auth(requires: CUSTOMER)
  
  # 结账与订单
  checkout(
    shippingAddressId: ID!
    billingSameAsShipping: Boolean = true
    billingAddressId: ID
    paymentGateway: PaymentGateway!
  ): Order! @auth(requires: CUSTOMER)
  
  cancelOrder(orderId: ID!): Order! @auth(requires: CUSTOMER)
  
  # 用户
  updateProfile(firstName: String, lastName: String, avatar: URL): User! @auth(requires: CUSTOMER)
  addAddress(input: AddressInput!): Address! @auth(requires: CUSTOMER)
  
  # 评论
  createReview(
    productId: ID!
    rating: Int!
    title: String
    content: String
    media: [URL!]
  ): Review! @auth(requires: CUSTOMER)
  
  # AI 辅助
  generateProductDescription(productId: ID!): AIGeneratedContent! @auth(requires: ADMIN)
  enrichProductWithAI(productId: ID!): Product! @auth(requires: ADMIN)
}

input AddressInput {
  fullName: String!
  phone: String
  streetLine1: String!
  streetLine2: String
  city: String!
  state: String
  postalCode: String!
  country: CountryCode!
  isDefault: Boolean
}

# ======================= SUBSCRIPTION (全动态核心) =======================

type Subscription {
  # 购物车实时变更 (商品增减、价格变动)
  cartUpdated(cartId: ID!): Cart @auth(requires: CUSTOMER)
  
  # 订单状态通知
  orderStatusChanged(orderId: ID!): Order @auth(requires: CUSTOMER)
  
  # 商品价格 / 库存实时变化 (用于动态页面刷新)
  productPriceChanged(productId: ID!): Product @auth(requires: CUSTOMER)
  productStockChanged(productId: ID!): Inventory @auth(requires: CUSTOMER)
  
  # AI 个性化推送 (例如限时专属折扣)
  aiFlashSale(userId: ID!): Product @auth(requires: CUSTOMER)
}